# A generic, single database configuration for Alembic.

[alembic]
# path to migration scripts
script_location = database

# template used to generate new migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, space-separated, to prepend to sys.path before loading env.py
prepend_sys_path = .

# timezone to use when rendering the date within the migration file as
# well as the filename.
# timezone =

# max length of characters to associate with the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded that are relative to the
# sys.path list, rather than only absolute paths.
# Allow imports relative to prepend_sys_path.
# allow_relative_imports = false

# version locations - list of paths containing version files.
# Defaults to database/versions. Uncomment to use multiple directories.
# version_locations = %(here)s/bar:%(here)s/bat

# version table name - the name of the database table Alembic uses to store
# migration history.
version_locations = database/versions

# logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
