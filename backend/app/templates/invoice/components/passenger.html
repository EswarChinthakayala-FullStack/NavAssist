<div class="card">
    <h3 class="card-title">Customer Information</h3>
    <ul class="info-list">
        <li class="info-item">
            <span class="info-label">Customer ID</span>
            <span class="info-value">#{{ passenger.id }}</span>
        </li>
        <li class="info-item">
            <span class="info-label">Full Name</span>
            <span class="info-value">{{ passenger.full_name }}</span>
        </li>
        <li class="info-item">
            <span class="info-label">Phone Number</span>
            <span class="info-value">{{ passenger_phone_masked }}</span>
        </li>
        {% if passenger.email %}
        <li class="info-item">
            <span class="info-label">Email Address</span>
            <span class="info-value">{{ passenger.email }}</span>
        </li>
        {% endif %}
    </ul>
</div>
